<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Now</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Lobster', cursive;
      margin: 0;
      padding: 0;
      background-image: url('5005.jpg');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center center;
      background-attachment: fixed;
      color: #333;
    }

    header {
      background-color: rgb(149, 2, 2);
      padding: 20px 0;
      color: #800000;
    }

    header .container {
      text-align: center;
    }

    nav ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    nav ul li {
      display: inline;
      margin-right: 15px;
    }

    nav ul li a {
      text-decoration: none;
      color: #fdf7f7;
      font-size: 1.2em;
    }

    nav ul li a:hover {
      color: #f08080;
    }

    .contact-section {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 20px;
      min-height: 80vh;
      background-color: rgba(255, 250, 240, 0.85);
      max-width: 800px;
      margin: 40px auto;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    }

    .contact-form {
      width: 100%;
      max-width: 500px;
    }

    .contact-form h1 {
      color: #800000;
      margin-bottom: 20px;
      text-align: center;
    }

    .contact-form form {
      display: flex;
      flex-direction: column;
    }

    .contact-form input,
    .contact-form textarea,
    .contact-form select {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1em;
    }

    .contact-form button {
      background-color: #800000;
      color: #fff;
      padding: 15px;
      border: none;
      border-radius: 5px;
      font-size: 1.2em;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .contact-form button:hover {
      background-color: #f08080;
    }

    .confirmation {
      display: none;
      color: green;
      font-size: 1.2em;
      margin-top: 10px;
      text-align: center;
    }

    .footer {
      background-color: rgba(255, 228, 225, 0.8);
      color: #800000;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
      border-top: 2px solid #f08080;
    }

    .welcome-banner {
      background-color: rgba(255, 240, 245, 0.95);
      padding: 20px 10px;
      border-top: 2px dashed #f08080;
      border-bottom: 2px dashed #f08080;
      text-align: center;
    }

    .welcome-banner h1 {
      margin: 0;
      font-size: 2.2em;
      color: #b22222;
      text-shadow: 1px 1px #fff;
    }

    @media (max-width: 768px) {
      .contact-section {
        flex-direction: column;
        padding: 30px 15px;
      }

      .contact-form {
        width: 100%;
      }
    }

    .nav li a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="welcome-banner">
  <h1>Welcome to our website! 🎂</h1>
</div>

<header>
  <div class="container">
    <nav>
      <ul class="nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="product.html">Our Products</a></li>
        <li><a href="bakery main web.html">Gallery</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="order.html">order</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </div>
</header>

<section class="contact-section">
<div class="contact-form">
<h1>Order Now</h1>

<form id="contactForm" action="https://formspree.io/f/xbdzapyv" method="POST">

<label>Full Name:</label>
<input type="text" name="name" placeholder="Your Name" required />

<label>Number:</label>
<input type="number" name="number" placeholder="Your number" required />

<label>Address:</label>
<input type="text" name="address" placeholder="Your address" required />

<label>Pincode:</label>
<input type="text" name="pincode" placeholder="Your pincode" required />

<label>State:</label>
<select name="state" required>
<option value="">Select state</option>
<option>Gujarat</option>
<option>Maharashtra</option>

<option>Chhattisgarh</option>

<option>Telangana</option>
</select>

<label>Product Name:</label>
<select name="product" required>

<option>Choclate Lava Cupcake</option>
<option>Vanilla Cream Pastry</option>
<option>Choclate Chip Cookie</option>
<option>Almond Biscotti</option>
<option>Fruit Danish Pastry</option>
<option>Kitkat Choclate Cake</option>
<option>Ferrero Rocher Cake</option>
</select>

<label>Gm & KG:</label>
<select name="weight" required>
<option value="">Select</option>
<option>200</option>
<option>300</option>
<option>400</option>
<option>500</option>
<option>600</option>
<option>800</option>
<option>900</option>
<option>1</option>

<option>2</option>
</select>

<label>Price:</label>
<select name="price" required>
<option value="">Select Price</option>
<option>220 ₹</option>  
<option>400 ₹</option>
<option>480 ₹</option>
<option>500 ₹</option>
<option>550 ₹</option>
<option>600 ₹</option>
<option>650 ₹</option>
<option>720 ₹</option>
<option>750 ₹</option>
<option>800 ₹</option>
<option>900 ₹</option>
<option>1000 ₹</option>

<option>1300 ₹</option>
<option>1400 ₹</option>
<option>1500 ₹</option>
<option>1600 ₹</option>
<option>1800 ₹</option>
<option>2000 ₹</option>
<option>2200 ₹</option>
<option>2400 ₹</option>
<option>2800 ₹</option>
<option>3000 ₹</option>
<option>4000 ₹</option>
</select>

<label>Message:</label>
<textarea name="message" rows="5" placeholder="Your Message"></textarea>

<button type="submit">Order</button>

</form>

<div class="confirmation" id="thankYouMessage">
Thank you! Your order has been sent. 🍰
</div>

</div>
</section>

<script>

const form = document.getElementById('contactForm');
const thankYou = document.getElementById('thankYouMessage');

form.addEventListener('submit', function() {

setTimeout(function(){
thankYou.style.display = 'block';
form.reset();
},1000);

});

</script>

<footer class="footer">
<div class="container">
<p>&copy; 2026 Sweet Indulgence Bakery. All Rights Reserved.</p>
</div>
</footer>

</body>
</html>
